  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <main class="layout">
      <header class="site-header">
        <a class="brand-link" href="/" data-hotkey="H">Computer Science Notes</a>
        <nav class="site-links" aria-label="Site navigation">
          <a href="/about/" data-hotkey="P">Portfolio</a>
          <a href="/#main-content" data-hotkey="N">Notes</a>
        </nav>
      </header>
      
    <nav class="topic-nav" aria-label="Topic navigation"><a href="/" data-hotkey="H">Home</a><a class="active" href="/topics/algorithms/" data-hotkey="1">Algorithms</a><a class="" href="/topics/agent-coding/" data-hotkey="2">Agentic Coding</a></nav>
    <section id="main-content" class="panel notes-panel">
      <h1 class="site-title">A* Search</h1>
      <p class="topic-parent">Subpage of Algorithms</p>
      <p class="topic-meta">Recurrences, asymptotics, and design techniques.</p>
      <article class="note-article notion-page-content"></article>
    </section>
  
    </main>
    <script>
      (() => {
        function isEditableTarget(target) {
          if (!target || !(target instanceof HTMLElement)) {
            return false;
          }

          return (
            target.isContentEditable ||
            target.tagName === "INPUT" ||
            target.tagName === "TEXTAREA" ||
            target.tagName === "SELECT"
          );
        }

        document.addEventListener("keydown", (event) => {
          if (
            event.defaultPrevented ||
            event.altKey ||
            event.ctrlKey ||
            event.metaKey ||
            event.key.length !== 1 ||
            isEditableTarget(event.target)
          ) {
            return;
          }

          const hotkey = event.key.toUpperCase();
          if (hotkey === "S") {
            const searchInput = document.getElementById("topic-search");
            if (searchInput) {
              event.preventDefault();
              searchInput.focus();
              return;
            }
          }

          const target = Array.from(document.querySelectorAll("[data-hotkey]")).find(
            (element) => element.dataset.hotkey?.toUpperCase() === hotkey && element.href,
          );

          if (target) {
            event.preventDefault();
            target.click();
          }
        });
      })();
    </script>
  </body>
